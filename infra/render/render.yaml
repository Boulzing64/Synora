services:
  - type: web
    name: synora-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build -w apps/api
    startCommand: npm run start -w apps/api
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: 4000
      - key: WEB_ORIGIN
        sync: false
      - key: JWT_SECRET
        sync: false