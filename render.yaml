services:
  - type: web
    name: synora-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build:api
    startCommand: npm run start -w apps/api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: WEB_ORIGIN
        sync: false
      - key: JWT_SECRET
        sync: false