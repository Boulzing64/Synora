services:
  - type: web
    name: synora-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build:api
    startCommand: npm run start -w apps/api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: WEB_ORIGIN
        sync: false
      - key: WEB_ORIGINS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: BASE_SEPOLIA_RPC_URL
        sync: false
      - key: SYN_STAKING_ADDRESS
        sync: false
      - key: REWARDS_SIGNER_PRIVATE_KEY
        sync: false
      - key: REWARDS_DISTRIBUTOR_ADDRESS
        sync: false
      - key: ADMIN_WALLET_ADDRESSES
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: MAGIC_LINK_FROM_EMAIL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        sync: false
      - key: REWARDS_CHAIN_ID
        value: 84532
      - key: BETA_MAX_TESTERS
        value: 100
